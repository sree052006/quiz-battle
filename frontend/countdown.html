<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Ready - Quiz Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="countdown.css">
</head>
<body>

    <div class="countdown-wrap">
        <div class="category-label" id="cat-label">Loading...</div>

        <div class="circle-wrap">
            <svg class="circle-svg" viewBox="0 0 220 220">
                <circle class="circle-bg" cx="110" cy="110" r="95"/>
                <circle class="circle-progress" id="ring" cx="110" cy="110" r="95"/>
            </svg>
            <div class="circle-number" id="num">3</div>
            <div class="go-text" id="go-text">GO!</div>
        </div>

        <div class="status-text" id="status">Get ready...</div>
    </div>

    <script src="countdown.js"></script>
</body>
</html>
