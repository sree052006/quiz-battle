<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Quiz Battle</title>

    <link rel="stylesheet" href="signup.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="left">

        <div class="logo">
            🧠
            <h1>Quiz Battle</h1>
            <p>Challenge Your Brain!</p>
        </div>

    </div>

    <div class="right">

        <div class="card">

            <h2>Create Account</h2>

            <input type="text" placeholder="Full Name">

            <input type="email" placeholder="Email">

            <input type="password" placeholder="Password">

            <input type="password" placeholder="Confirm Password">

           <button id="createBtn">Create Account</button>
             
            <p>
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </div>

    </div>

</div>
<script>
  document.getElementById("createBtn").addEventListener("click", function () {
    const name = document.querySelector('input[placeholder="Full Name"]').value.trim();
    const email = document.querySelector('input[placeholder="Email"]').value.trim();
    const password = document.querySelector('input[placeholder="Password"]').value.trim();
    const confirm = document.querySelector('input[placeholder="Confirm Password"]').value.trim();

    if (!name || !email || !password || !confirm) {
      alert("Please fill in all fields.");
      return;
    }

    if (password !== confirm) {
      alert("Passwords do not match!");
      return;
    }

    // Save user to localStorage
    localStorage.setItem("quizUser", JSON.stringify({ name, email }));

    // Redirect to category page
    window.location.href = "category.html";
  });
</script>
</body>
</html>
